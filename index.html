<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>等価交換</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    
    <style>
      .input-block {
        display: flex;
        flex-direction: column;
      }
      .select-block {
        margin-bottom: 16px;
      }
      select, label {
        height: 52px;
        font-size: 14px;
      }
      .vertical-middle{
        background: yellow; 
        display: table-cell;
        vertical-align: middle; 
      }
      input[type=checkbox] {
        transform: scale(1.5);
      }
      .hidden {
        display: none;
      }
      .box-019 {
          position: relative;
          margin-top: 1em;
          padding: 1.8em 1.5em 1em 1.5em;
          border: 2px solid #25d061;
      }
      .box-019 > div {
          position: absolute;
          top: -1.15em;
          left: -.5em;
          padding: .4em 1.4em;
          border-radius: 25px;
          background-color: #25d061;
          color: #fff;
          font-size: .9em;
      }
      .jouken-tag {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 4px;
        font-size: 13px;
        margin: 0 3px;
        cursor: pointer;
        text-decoration: underline dotted;
      }
      .jouken-tag-normal {
        background: #fff3cd;
        color: #856404;
        border: 1px solid #ffc107;
        font-weight: 500;
      }
      .jouken-tag-danger {
        background: #ff4d4d;
        color: #fff;
        border: 1px solid #c0392b;
        font-weight: 500;
        animation: tagPulse 1s ease-in-out infinite;
      }
      @keyframes tagPulse {
        0%,100% { box-shadow: 0 0 0 0 rgba(255,77,77,.6); }
        50%      { box-shadow: 0 0 0 6px rgba(255,77,77,0); }
      }
      .jouken-warn-box {
        margin-top: 6px;
        padding: 8px 12px;
        background: #fff8e1;
        border-left: 3px solid #ffc107;
        border-radius: 4px;
        font-size: 13px;
        color: #856404;
      }
    </style>
  </head>
  <body>
    <div class="container" style="min-width: 600px;">
      <div class="my-3 p-3 bg-light border rounded">
        <div class="row align-items-center g-3">
          <div class="col-auto">
            <label for="mokuhyou" class="form-label mb-0 fw-bold">目標薬価:</label>
            <input type="number" class="form-control d-inline-block text-center" style="width:150px;" step="0.1" min="0" id="mokuhyou" onfocus="this.select();">
          </div>
          <div class="col-auto">
            <label for="siborikomi" class="form-label mb-0 fw-bold">絞り込み:</label>
            <input type="number" class="form-control d-inline-block text-center" style="width:80px;" step="0.1" min="0" id="siborikomi" onfocus="this.select();"> <span class="fw-bold">円以内</span>
          </div>
          <div class="col-auto ms-auto">
            <button type="button" class="btn btn-primary" id="calcbtn" onclick="実行ボタン();">計算実行</button>
            <button type="button" class="btn btn-secondary ms-2" id="clearbtn" onclick="クリアボタン();">クリア</button>
          </div>
        </div>
      </div>

      <table class="table table-bordered align-middle text-center" style="font-size: 14px;">
        <thead class="table-dark">
          <tr>
            <th style="width: 5%;">選択</th>
            <th style="width: 35%;">薬剤名</th>
            <th style="width: 12%;">薬価</th>
            <th style="width: 10%;">シート枚数</th>
            <th style="width: 12%;">端数禁止</th>
            <th style="width: 13%;">下限値</th>
            <th style="width: 13%;">上限値</th>
          </tr>
        </thead>
        <tbody id="yakuzaiTableBody">
          <script>
            for(let i=1; i<=5; i++) {
              document.write(`
                <tr>
                  <td><input type="checkbox" id="check${i}"></td>
                  <td><input type="text" class="form-control form-control-sm" id="name${i}"></td>
                  <td><input type="number" class="form-control form-control-sm text-end" step="0.1" min="0" id="yakka${i}" onfocus="this.select();"></td>
                  <td><input type="number" class="form-control form-control-sm text-center" min="1" id="josu${i}" onfocus="this.select();"></td>
                  <td><input type="checkbox" id="hasu${i}"></td>
                  <td><input type="number" class="form-control form-control-sm text-center" min="0" id="kagen${i}" onfocus="this.select();"></td>
                  <td><input type="number" class="form-control form-control-sm text-center" min="0" id="jogen${i}" onfocus="this.select();"></td>
                </tr>
              `);
            }
          </script>
        </tbody>
      </table>

      <div id="jouken_container"></div>

      <div id="result_area" class="mt-4"></div>
    </div>

    <script>
      // ご指定いただいた初期デフォルトデータ
      const DEFAULT_DATA = {
        mokuhyou: 543.2,
        siborikomi: 0.4,
        yakuzai: [
          { check: true,  name: "センノシド錠12mg", yakka: 5.5, josu: 10, hasu: false, jogen: "", kagen: "" },
          { check: true,  name: "ランソプラゾール15㎎", yakka: 10.8, josu: 10, hasu: false, jogen: "", kagen: "" },
          { check: true,  name: "メコバラミン錠 500μg", yakka: 6.1, josu: 10, hasu: false, jogen: "", kagen: "" },
          { check: true,  name: "シーピー配合顆粒", yakka: 6.9, josu: 3, hasu: false, jogen: "", kagen: "" },
          { check: false, name: "タケキャブ10㎎", yakka: 91.6, josu: 10, hasu: false, jogen: "", kagen: "" }
        ]
      };

      // ページ読み込み完了時：データの復元
      window.addEventListener('DOMContentLoaded', () => {
        let savedData = localStorage.getItem('tokakokan_data');
        if (!savedData) {
          savedData = DEFAULT_DATA;
          localStorage.setItem('tokakokan_data', JSON.stringify(savedData));
        } else {
          savedData = JSON.parse(savedData);
        }
        reflectDataToForm(savedData);
      });

      // フォームに入元データを反映
      function reflectDataToForm(data) {
        document.getElementById('mokuhyou').value = data.mokuhyou;
        document.getElementById('siborikomi').value = data.siborikomi;
        for (let i = 1; i <= 5; i++) {
          const item = data.yakuzai[i - 1];
          if (item) {
            document.getElementById(`check${i}`).checked = item.check;
            document.getElementById(`name${i}`).value = item.name;
            document.getElementById(`yakka${i}`).value = item.yakka;
            document.getElementById(`josu${i}`).value = item.josu;
            document.getElementById(`hasu${i}`).checked = item.hasu;
            document.getElementById(`kagen${i}`).value = item.kagen;
            document.getElementById(`jogen${i}`).value = item.jogen;
          }
        }
      }

      // 現在の画面の入力状態をlocalStorageに永続保存する
      function saveCurrentData() {
        const currentData = {
          mokuhyou: parseFloat(document.getElementById('mokuhyou').value) || 0,
          siborikomi: parseFloat(document.getElementById('siborikomi').value) || 0,
          yakuzai: []
        };
        for (let i = 1; i <= 5; i++) {
          currentData.yakuzai.push({
            check: document.getElementById(`check${i}`).checked,
            name: document.getElementById(`name${i}`).value,
            yakka: parseFloat(document.getElementById(`yakka${i}`).value) || 0,
            josu: parseInt(document.getElementById(`josu${i}`).value) || 0,
            hasu: document.getElementById(`hasu${i}`).checked,
            kagen: document.getElementById(`kagen${i}`).value,
            jogen: document.getElementById(`jogen${i}`).value
          });
        }
        localStorage.setItem('tokakokan_data', JSON.stringify(currentData));
      }

      // 実行ボタンを押した時の処理
      function 実行ボタン() {
        saveCurrentData(); // 計算前に現在の入力を自動保存

        const mokuhyou = parseFloat(document.getElementById('mokuhyou').value) || 0;
        const siborikomi = parseFloat(document.getElementById('siborikomi').value) || 0;

        // 計算ロジックに渡すデータ配列のビルド
        let inputList = [];
        for (let i = 1; i <= 5; i++) {
          if (document.getElementById(`check${i}`).checked) {
            let name = document.getElementById(`name${i}`).value || `薬剤${i}`;
            let yakka = parseFloat(document.getElementById(`yakka${i}`).value) || 0;
            let josu = parseInt(document.getElementById(`josu${i}`).value) || 1;
            let hasu = document.getElementById(`hasu${i}`).checked;
            let kagen = document.getElementById(`kagen${i}`).value !== "" ? parseInt(document.getElementById(`kagen${i}`).value) : null;
            let jogen = document.getElementById(`jogen${i}`).value !== "" ? parseInt(document.getElementById(`jogen${i}`).value) : null;

            // [名称, 薬価, シート数, 端数禁止フラグ, 上限, 下限, 元の番号]
            inputList.push([name, yakka, josu, hasu, jogen, kagen, i]);
          }
        }

        if (inputList.length === 0) {
          alert("計算対象の薬剤にチェックを入れてください。");
          return;
        }

        // 計算に必要なHTML構造をあらかじめ描画
        document.getElementById('result_area').innerHTML = generateResultTableHeader();

        // 旧Code.gsから移植した計算処理のキック
        概算処理(mokuhyou, inputList);
      }

      function クリアボタン() {
        if(confirm("入力を初期状態に戻しますか？")) {
          reflectDataToForm(DEFAULT_DATA);
          localStorage.setItem('tokakokan_data', JSON.stringify(DEFAULT_DATA));
          document.getElementById('result_area').innerHTML = "";
          document.getElementById('jouken_container').innerHTML = "";
        }
      }

      function generateResultTableHeader() {
        let html = `<table class="table table-striped table-bordered align-middle text-center" style="font-size: 13px;">`;
        html += `<thead class="table-dark"><tr><th style="width:6%">順位</th><th style="width:12%">合計薬価</th><th style="width:10%">差額</th>`;
        for (let l = 1; l <= 5; l++) {
          html += `<th><span id="midasi_${l}">-</span></th>`;
        }
        html += `</tr></thead><tbody>`;
        for (let rank = 1; rank <= 30; rank++) {
          html += `<tr><td>${rank}</td><td><span id="goukei${rank}"></span></td><td><span id="sagaku${rank}"></span></td>`;
          for (let l = 1; l <= 5; l++) {
            html += `<td><span id="kekka${rank}_${l}"></span></td>`;
          }
          html += `</tr>`;
        }
        html += `</tbody></table>`;
        html += `<div class="mt-2 fw-bold"><span id="yukousuu" style="color: red;"></span> <span id="sousuu"></span></div>`;
        html += `<p id="siborikomijouken" class="text-muted small"></p>`;
        return html;
      }

      // ============================================================
      // 🧮 旧 Code.gs 側から移植したコアロジック群
      // ============================================================
      function 概算処理(mokuhyou, 元list) {
        const list  = 元list.map(i => i[1]);
        const list2 = 元list.map(i => i[2]);
        const list4 = 元list.map(i => i[4]);

        let 何通り = 1;
        for (let j of list) {
          何通り = 何通り * (mokuhyou * 10) / (j * 10);
        }

        let 基準値 = 10000000;
        let 下限オフセット = [];
        let 上限係数配列 = [];
        let 条件タグ配列 = [];

        for (let i = 0; i < 元list.length; i++) {
          let item = 元list[i];
          let kagen = item[5];
          let jogen = item[4];
          下限オフセット.push(kagen !== null ? kagen : 0);
          上限係数配列.push({ idx: i, yakka: item[1], josu: item[2], jogen: jogen, kagen: kagen });
        }

        let 補正結果 = 基準値チェックと補正(mokuhyou, 上限係数配列, 下限オフセット, 基準値, list);
        let 新たな目標値 = mokuhyou;
        let 概算係数 = null;

        if (補正結果 === false) {
          document.getElementById('result_area').innerHTML = "<div class='alert alert-danger'>条件に合う組み合わせが存在しないか、計算範囲を超えています。</div>";
          return;
        } else if (Array.isArray(補正結果)) {
          新たな目標値 = 補正結果[0];
          概算係数 = 補正結果[1];
        }

        if (概算係数) {
          for (let i = 0; i < 元list.length; i++) {
            let item = 元list[i];
            let gaisanKosu = 概算係数[i] * item[2];
            let label = item[4] !== null ? "上限値" : "概算";
            条件タグ配列.push(`<span class="jouken-tag ${item[4] !== null ? 'jouken-tag-danger' : 'jouken-tag-normal'}">${item[0]}: ${gaisanKosu}個固定 (${label})</span>`);
          }
        } else {
          for (let i = 0; i < 元list.length; i++) {
            let item = 元list[i];
            if (item[5] !== null && item[5] > 0) {
              条件タグ配列.push(`<span class="jouken-tag jouken-tag-normal">${item[0]}: 下限 ${item[5]*item[2]}個</span>`);
            }
          }
        }

        let container = document.getElementById('jouken_container');
        if (条件タグ配列.length > 0) {
          container.innerHTML = `<div class="jouken-warn-box">⚠️ 組み合わせ数が膨大なため、以下の条件で探索を絞り込みました:<br>${条件タグ配列.join('')}</div>`;
        } else {
          container.innerHTML = "";
        }

        // 全通り計算を実行
        全通り計算(新たな目標値, 元list, 概算係数, 下限オフセット);
      }

      function 全通り計算(mokuhyou, 元list, 概算係数, 下限オフセット) {
        const siborikomi = parseFloat(document.getElementById('siborikomi').value) || 0;
        let validRows = 元list;

        for (let l = 1; l <= 5; l++) {
          let midasiSpan = document.getElementById(`midasi_${l}`);
          if (l <= validRows.length) {
            midasiSpan.innerText = validRows[l - 1][0];
          } else {
            midasiSpan.innerText = "-";
          }
        }

        let list = [];
        for (let i = 0; i < validRows.length; i++) {
          let item = validRows[i];
          let isFixed = 概算係数 && 概算係数[i] > 0;
          list.push([item[0], item[1], item[2], item[3], item[4], item[5], isFixed]);
        }

        let array = new Array(list.length).fill(0);
        let ans = [];
        let 探索目標10 = Math.round(mokuhyou * 10);
        let 総当たり数 = 0;

        function sortUnitSales(a, b) {
          if (a[0] !== b[0]) return a[0] - b[0];
          if (a[1] !== b[1]) return b[1] - a[1];
          return 0;
        }

        function 終了判定(list, array, 目標10) {
          let 合計10 = 0;
          for (let l = 1; l < list.length; l++) {
            合計10 += array[l] * (list[l][1] * 10);
          }
          let 目標2 = 目標10 - 合計10;
          if (目標2 < 0) return false;
          return 個数(目標2, list[0][1] * 10);
        }

        function 個数(目標, 薬価) {
          let cnt = 1;
          while (目標 - 薬価 * cnt >= 0) cnt++;
          let 判定値 = 目標 - 薬価 * (cnt - 1);
          if (判定値 === 0) return cnt - 1;
          return false;
        }

        if (list.length === 1) {
          let singleYakka10 = Math.round(list[0][1] * 10);
          let itemJosu = list[0][2];
          let hasuKinsi = list[0][3];
          let jogenSheet = list[0][4];
          let kagenSheet = list[0][5];

          let startSheet = kagenSheet !== null ? kagenSheet : 0;
          let maxSheet = Math.floor(探索目標10 / (singleYakka10 * itemJosu)) + 5;
          if (jogenSheet !== null) maxSheet = Math.min(maxSheet, jogenSheet);

          for (let s = startSheet; s <= maxSheet; s++) {
            let currentKosu = s * itemJosu;
            let currentPrice10 = singleYakka10 * currentKosu;
            let diff = Math.abs(currentPrice10 - 探索目標10) / 10;
            if (diff <= siborikomi) {
              ans.push([diff, currentKosu, [currentKosu]]);
            }
          }
        } else {
          // 多品目の総当たり
          while (true) {
            総当たり数++;
            let flag = true;
            for (let l = 1; l < list.length; l++) {
              let itemYakka10 = Math.round(list[l][1] * 10);
              let itemJosu = list[l][2];
              let hasuKinsi = list[l][3];
              let jogenSheet = list[l][4];
              let kagenSheet = list[l][5];
              let isFixed = list[l][6];

              if (isFixed) {
                if (array[l] < 概算係数[l]) {
                  array[l] = 概算係数[l];
                  break;
                } else {
                  array[l] = 0;
                  if (l === list.length - 1) flag = false;
                  continue;
                }
              }

              let currentKosu = array[l] * itemJosu;
              let checkPrice10 = itemYakka10 * currentKosu;

              let offsetSheet = kagenSheet !== null ? kagenSheet : 0;
              let nextKosu = (array[l] + 1 + offsetSheet) * itemJosu;
              let nextPrice10 = itemYakka10 * nextKosu;

              let overJogen = (jogenSheet !== null) && ((array[l] + 1 + offsetSheet) > jogenSheet);

              if (探索目標10 - nextPrice10 >= 0 && !overJogen) {
                array[l]++;
                break;
              } else {
                array[l] = 0;
                if (l === list.length - 1) flag = false;
              }
            }

            if (!flag) break;

            let result = 終了判定(list, array, 探索目標10);
            if (result !== false) {
              let lastIdx = 0;
              let itemJosu0 = list[lastIdx][2];
              let hasuKinsi0 = list[lastIdx][3];
              let jogenSheet0 = list[lastIdx][4];
              let kagenSheet0 = list[lastIdx][5];
              let isFixed0 = list[lastIdx][6];

              let totalSheet0 = result + (kagenSheet0 !== null ? kagenSheet0 : 0) + (概算係数 ? 概算係数[0] : 0);
              let totalKosu0 = totalSheet0 * itemJosu0;

              let valid0 = true;
              if (jogenSheet0 !== null && totalSheet0 > jogenSheet0) valid0 = false;
              if (hasuKinsi0 && (totalKosu0 % itemJosu0 !== 0)) valid0 = false;

              if (valid0) {
                let current_price10 = Math.round(list[lastIdx][1] * 10) * totalKosu0;
                let current_cnt_array = [totalKosu0];

                for (let m = 1; m < list.length; m++) {
                  let off = 下限オフセット[m];
                  let finalSheet = array[m] + off;
                  current_price10 += Math.round(list[m][1] * 10) * (finalSheet * list[m][2]);
                  current_cnt_array.push(finalSheet * list[m][2]);
                }

                let diff = Math.abs(current_price10 - 探索目標10) / 10;
                if (diff <= siborikomi) {
                  ans.push([diff, current_price10 / 10, current_cnt_array]);
                }
              }
            }
          }
        }

        ans.sort(sortUnitSales);

        // 結果のDOM出力
        let disp_cnt = Math.min(ans.length, 30);
        for (let rank = 1; rank <= disp_cnt; rank++) {
          let data = ans[rank - 1];
          document.getElementById(`goukei${rank}`).innerText = data[1].toFixed(1);
          document.getElementById(`sagaku${rank}`).innerText = (data[1] - mokuhyou).toFixed(1);

          for (let l = 1; l <= 5; l++) {
            let cell = document.getElementById(`kekka${rank}_${l}`);
            if (l <= data[2].length) {
              let kosu = data[2][l - 1];
              let josu = list[l - 1][2];
              cell.innerText = `${kosu}個 (${(kosu/josu).toFixed(1)}s)`;
            } else {
              cell.innerText = "-";
            }
          }
        }

        document.getElementById('yukousuu').innerText = `条件一致: ${ans.length}通り`;
        document.getElementById('sousuu').innerText = `(総当たりループ数: ${総当たり数})`;
        document.getElementById('siborikomijouken').innerText = `※目標：${mokuhyou}円 から ±${siborikomi}円 以内を表示しています。`;
      }

      function 基準値チェックと補正(新たな目標値, 上限係数配列, 下限オフセット, 基準値, list) {
        let 何通り = 1;
        for (let j of list) {
          何通り = 何通り * (新たな目標値 * 10) / (j * 10);
        }
        if (何通り <= 基準値) return null;

        let 概算係数 = new Array(list.length).fill(0);
        let 完全終了 = false;

        上限係数配列.sort((a, b) => {
          if (a.jogen !== null && b.jogen === null) return -1;
          if (a.jogen === null && b.jogen !== null) return 1;
          return b.yakka - a.yakka;
        });

        for (let item of 上限係数配列) {
          let maxSheet = Math.floor((新たな目標値 * 10) / (item.yakka * 10 * item.josu));
          if (item.jogen !== null) {
            let 上限係数 = item.jogen - item.kagen;
            if (上限係数 < 0) return false;
            let 上限固定後目標 = 新たな目標値 - (item.yakka * item.josu * 上限係数);
            if (上限固定後目標 > 0) {
              新たな目標値 = 上限固定後目標;
              概算係数[item.idx] = 上限係数;
              let 残り何通り = 1;
              for (let j of list) {
                残り何通り = 残り何通り * (上限固定後目標 * 10) / (j * 10);
              }
              if (残り何通り <= 基準値) 完全終了 = true;
            } else {
              概算係数[item.idx] = 0;
            }
          } else {
            let 上限係数 = Math.max(0, maxSheet - 1);
            let 上限固定後目標 = 新たな目標値 - (item.yakka * item.josu * 上限係数);
            if (上限固定後目標 > 0) {
              新たな目標値 = 上限固定後目標;
              概算係数[item.idx] = 上限係数;
              let 残り何通り = 1;
              for (let j of list) {
                残り何通り = 残り何通り * (上限固定後目標 * 10) / (j * 10);
              }
              if (残り何通り <= 基準値) 完全終了 = true;
            } else {
              概算係数[item.idx] = 0;
            }
          }
          if (完全終了) break;
        }

        for (let i = 0; i < list.length; i++) {
          概算係数[i] += 下限オフセット[i];
        }

        if (概算係数.every(v => v === 0)) return false;
        return [新たな目標値, 概算係数];
      }
    </script>
